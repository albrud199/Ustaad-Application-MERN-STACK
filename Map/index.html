<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ustaad Map - OpenStreetMap</title>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background: #1a1a1a;
        color: #fff;
      }
      #map {
        height: 100vh;
        width: 100%;
      }
      .info-panel {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.8);
        padding: 15px;
        border-radius: 8px;
        z-index: 400;
        max-width: 300px;
      }
      .info-panel h2 {
        margin-bottom: 10px;
        color: #00d4ff;
      }
      .info-panel p {
        font-size: 12px;
        line-height: 1.5;
      }
    </style>

    <title>Ustaad Map - OpenStreetMap</title>
  </head>
  <body>
    <div id="map"></div>

    <div class="info-panel">
      <h2>🗺️ Ustaad Map</h2>
      <p>Free OpenStreetMap - No API key needed!</p>
      <p style="margin-top: 10px; color: #00ff88">✓ Completely Free</p>
      <p style="color: #00ff88">✓ No API Key Required</p>
      <p style="color: #00ff88">✓ Works Offline</p>
    </div>

    <script>
      // Initialize map centered on Dhaka, Bangladesh
      var map = L.map("map").setView([23.8103, 90.4125], 13);

      // Add OpenStreetMap tiles
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution:
          '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      }).addTo(map);

      // Add a sample marker
      L.marker([23.8103, 90.4125])
        .addTo(map)
        .bindPopup("Dhaka, Bangladesh")
        .openPopup();

      // Geolocation
      navigator.geolocation.watchPosition(success, error);

      let userMarker;

      function success(pos) {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        if (userMarker) {
          userMarker.setLatLng([lat, lng]);
        } else {
          userMarker = L.marker([lat, lng], {
            title: "Your Location",
          }).addTo(map);
          userMarker.bindPopup("📍 You are here!").openPopup();
          map.setView([lat, lng], 15);
        }
      }

      function error(err) {
        console.log("Geolocation error:", err);
      }
    </script>
  </body>
</html>
